AlterMann:

  Status_1:

    Auswahl_1:

      schlecht: |
        "Dir erzäle ich gar nichts." 
        Der alte Mann schaut dich genervt an...

      mittel: |
        "Dies ist kein gewöhnliches Haus, es ist ein Dungeon. Schatten zucken in den Ecken, 
        Türen öffnen auf enge Gänge, die tiefer ins Herz führen.
        Du wirst Gegnern begegnen: verhüllte Wächter, knarrende Puppen, schleimige Gestalten 
        aus den Kellerwänden. Je weiter wir gehen, desto härter werden die Prüfungen; die Luft kühlt, 
        Schritte hallen länger, und Fallen werden tödlich. Es heißt, irgendwo im Haus 
        tief unten gibt es einen Endboss, dessen Blick man spüren soll wenn man im hier ist."

      gut: |
        "Das hier ist kein gewöhnliches Haus, es ist ein Dungeon. Schon in der Eingangshalle bewegen sich Schatten in den Ecken,
        Gänge hinter den Türen verengen sich und führen tiefer ins Herz des Gebäudes. 
        Du wirst Gegnern begegnen: verhüllte Wächter mit bleichen Gesichtern, knarrende Puppen, schleimige Gestalten, 
        die aus feuchten Kellerwänden kriechen. Je weiter wir vordringen, desto härter werden die Prüfungen. Die Luft wird kälter, 
        das Echo unserer Schritte hallt länger, und Fallen, die zunächst harmlos wirkten, werden tödlich.
        Mit dem, was du jetzt bei dir hast, kommst du nicht sehr weit — doch manche Gegner lassen Dinge fallen, die nützlich sein könnten. 
        Man hört auch von einzelnen mächtigen Gegenständen, die irgendwo im Haus liegen sollen, 
        aber das sind nur Gerüchte, ein leiser Anreiz mehr als eine Garantie.
        Und dann gibt es noch das Gerücht vom Endboss: Ein Wesen, das tief unten hausen soll, 
        einmal Mensch, nun von der Hausmacht verdreht — das am Ende alles zusammenhält. 
        Manche Leute sagen, wer das Haus betritt, spürt bereits sein Auge auf sich gerichtet. 
        Wir stehen im ersten Raum, dem Startraum, jede Tür eine Einladung, jeder Windhauch eine Warnung." 

    Auswahl_2:

      schlecht: |
        "Dir gebe ich absolut gar nichts, Neuer. Besser wenn du gehst."

      mittel: |
        "Was ich dir geben kann, ist dieses alte Schwert, das ich zu Beginn meiner Laufbahn geführt habe…"
        Der alte Mann reicht dir das stumpfe, abgenutzte Schwert, das mehr Rost als Stahl trägt.
        "Nimm’s, wenn du willst, ich hab’ genug damit zu tun, dich hier allein zu lassen.""

      gut: |
        "Du bist also bereit, dich in die finsteren Hallen dieses Dungeons zu wagen.
        Was ich dir überreichen kann, ist ein Schwert, das ich selbst in meinen jüngeren Tagen geschmiedet habe, 
        als das Blut noch heißer und die Nächte kürzer waren."
        Der alte Mann legt dir das Schwert vorsichtig in die Hand, lässt die Klinge im schwachen Licht des Eingangsraums aufblitzen...
        "Dieses Stück hat mich durch so manche enge Gasse und dunkle Kammer getragen.
        Ich erinnere mich an die erste Begegnung mit den bleichen Wächtern, ihre Gesichter waren blass wie das Mondlicht, 
        doch das Metall in meiner Hand schnitt durch ihre Rüstung, als wäre es nichts weiter als Papier.
        Jeder Schritt hier hallt wider, jede Falle ist ein Flüstern des Hauses, das uns testen will, Nimm dieses Schwert,
        und geh weiter. Es wird dir mehr nützen als das rostige Stück, das ich einst vergaß. Doch sei gewarnt, das Haus hat seine eigenen Pläne...
        Mit einem letzten Blick, halb Stolz, halb Müdigkeit, fügt er hinzu
        „Und nun... lass mich endlich meine Ruhe haben.“

    Auswahl_3:

      schlecht: |
        „Na gut, dann verschwinde. Viel Glück, du wirst es sowieso nicht lange schaffen.“

      mittel: |
        „Weg mit dir, dann. Aber vergiss nicht: Auch ein alter Knochen kann noch ein gutes Ziel treffen.“

      gut: |
        „Also geh, wenn du musst. Aber denk dran, dass selbst ein müder Wanderer hier nicht allein ist.
        Wenn du weitergehst, schau doch bei den beiden Gestalten dort drüben vorbei, sie kennen ein paar versteckte Pfade, 
        die dir das Weiterkommen erleichtern können.
        Und vergiss nicht: Jeder Schritt, den du machst, bringt dich näher an das Ziel, selbst wenn das Haus dich noch prüft.“

ZweiGestalten:

  Status_2:

    Auswahl_1:

      schlecht: |
        Mehr über uns erzählen? Das würde dir so passen. Wir werden dir gleich erzählen wie gut wir jemanden unter die Erde befördern können...

      mittel: |
        „Wir haben schon viel gesehen – unser Wesen ist verformt, das Ergebnis jahrhundertlanger Veränderung.“

        „Und doch tragen wir das Gewicht einer Ära, die längst vergangen ist. Unsere Haut trägt die Narben der Zeit, doch unser Blick bleibt wachsam.“

        „Wir wandern seit Äonen durch diese Hallen, immer auf der Suche nach dem Einen, das uns endlich Ruhe geben könnte.“

        „Aber sei gewarnt, Fremder. Misstrauen ist unser ständiger Begleiter – wir haben gelernt, dass jeder Besucher ein neues Rätsel birgt.“

        „Also wähle deine Worte weise, denn wir lauschen und prüfen jede Regung, bevor wir dir weiter zulassen.“

      gut: |
        Aric: „Ich bin Aric, 678 Jahre alt, ein Ghul. Früher war ich einfacher Handwerker, dann zog mich ein altes Ritual in die Schatten. 
              Jetzt sammle ich Wissen aus zerfallenen Ruinen und spreche nur, wenn ich sicher bin, dass das Wort etwas bewirkt.“
        
        Selene: „Selene, 956 Jahre, Vampirin. Einst Gelehrte, jetzt Gefangene eines uralten Fluchs.“

        Aric: „Wir sind auf der suche nach einem Artefakt. Das ‚Herz des Baumes‘, ein uraltes Relikt, 
              das angeblich die Qual unserer Untoten mildert und Frieden schenkt. Es ist der Kern eines längst vergessenen, 
              magischen Baumes, tief verborgen und von Rätseln bewacht.“

        Selene: „Der Baum war einst ein Wächter der Erde. Sein Kern wurde aus der physischen Welt gerissen und in einen versiegelten Ort gebracht.“

        Aric: „Ich habe Jahrhunderte damit verbracht, Karten zu entziffern und Ruinen zu durchforsten. Ohne einen Verbündeten wäre das Ziel unerreichbar,
              doch Vertrauen ist rar.“
    Auswahl_2:
    
      schlecht: |
        "Du willst was von uns? Ganz sicher sicher nicht. Sieh zu das du Land gewinnst."

      mittel: |
        "Mmhh, Unterstützen, aber nur weil der alter dich mag."
        Die blasse Gestalt holt einen schlicht aussehenden Ring hervor.
        "Hier nimm, er sollte dir auf deinem Abenteuer helfen"

      gut: |
        "Eigentlich misstraue ich ja allen, bei dir habe ich aber ein eher gutes Gefühl"
        Ihre Rubin roten Augen richten sich auf ihre Tasch wo sie einen silbernen Ring hervor.
        "Dieser Ring hat mir am Anfang meiner Reise sher geholfen, dir wird er mit sicherheit auch helfen"