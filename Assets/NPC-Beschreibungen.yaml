AlterMann: |

    Alter & Zustand: 
        Rund 73 Jahre alt, körperlich bereits etwas heruntergekommen. Die Haut ist wettergegerbt, von tiefen Furchen durchzogen, 
        und zeigt deutlich die Spuren eines langen, beschwerlichen Lebens. Trotz seiner gebrechlichen Erscheinung lässt sich ein 
        Funke unbeugsamer Entschlossenheit erkennen.

    Aussehen:
        Gesicht:  Ein kantiges Antlitz mit hohem, eingefallenen Stirnbereich, durchzogen von feinen, silbrig-grauen Haarsträhnen, 
                  die an den Schläfen zu einem dünnen, ungepflegten Zopf zusammengebunden sind.

        Körper: Schlanker, leicht gebeugter Oberkörper, dessen Muskulatur kaum noch die einstige Stärke widerspiegelt. Die Hände 
                sind knochig, die Finger von Narben übersät – Zeichen zahlloser Kämpfe und harter Arbeit.

        Rüstung:  Der wahre Blickfang ist seine Rüstung. Der ehemals strahlende Brustpanzer aus poliertem Stahl ist nun matt geworden, 
                  von Rostflecken übersät und an mehreren Stellen verbeult. Dennoch lässt sich die kunstvolle Gravur erkennen: 
                  ein eingraviertes Wappen, das einst für königliche Tapferkeit stand. Die Schulterplatten tragen noch immer die verblasste 
                  Farbe eines alten Wappens, das einst in den Farben Gold und Purpur erstrahlte. Die Rüstung wirkt, als hätte sie viele 
                  Schlachten überlebt und dennoch nie vollständig ihren Glanz verloren – ein klares Indiz dafür, 
                  dass ihr Träger einst zu den Besten gehörte.

    Hintergrund:
        Ursprung: Geboren in einem abgelegenen Grenzdorf, wuchs er als Sohn eines Schmieds auf. Schon früh lernte er den Umgang mit Metall, 
                  was später die Basis für seine spätere Rüstung bildete.

        Militärische Laufbahn:  Mit 18 trat er in die königliche Leibgarde ein, wo er rasch zum erfahrenen Schildknappen aufstieg. 
                                Während dreier großer Feldzüge gewann er zahlreiche Auszeichnungen, darunter das begehrte „Silberne Kreuz der Tapferkeit“.

        Niedergang: Nach dem Untergang seines Königreichs und dem Verrat einiger Kameraden verlor er fast alles, Land, Titel und 
                    fast sämtliche Kameraden. Die Rüstung blieb das einzige greifbare Zeugnis seiner einstigen Stellung.

    Charakter:
        Entschlossenheit: Trotz des körperlichen Verfalls ist sein Wille ungebrochen. Er hält an einem strengen Ehrenkodex fest, 
                          der ihn dazu zwingt, jedes Wort zu überdenken, bevor er spricht.

        Zynismus: Die Jahre des Verrats und Verlusts haben ihn zynisch gemacht; er vertraut selten und misst jede neue Bekanntschaft streng ab.

        Wissen: Durch das ständige Studium alter Schlachtenbücher und das Reparieren seiner eigenen Rüstung hat er ein tiefes technisches 
                Verständnis für Waffen und Panzerungen entwickelt.

        Ehrgeiz: Sein innerer Antrieb ist, die einstige Pracht seiner Rüstung wiederherzustellen – ein Symbol für die Wiedererlangung seiner eigenen Würde.

    Besondere Merkmale:
        Schmiedewerkzeug: An seinem Gürtel hängt ein abgenutzter Hammer, der mehr als bloßes Werkzeug dient, er ist ein Symbol 
                          seiner Herkunft und ein ständiger Begleiter beim Reparieren seiner Rüstung.

        Tarnzeichen:  Auf der Innenseite seiner linken Handschuhseite befindet sich ein kaum sichtbares, eingraviertes Symbol: 
                      ein stilisierter Phönix, das für Wiederauferstehung steht – ein Hinweis darauf, dass er trotz aller Widrigkeiten 
                      immer noch an eine mögliche Rückkehr zur Größe glaubt.

Aric – 678 Jahre alt, ein Ghul: |
  Aussehen:
    Haut: Blass bis fast durchsichtig, wirkt wie dünnes Pergament, das im schwachen Licht leicht schimmert.

    Risse:  Feine, netzartige Risse durchziehen die Oberfläche, erinnern an alte Adern oder Risse in altem Stein. Sie sind nicht nur 
            kosmetischer Natur, sie zeugen von Jahrhunderten des Verfalls und der Anpassung an die Schattenwelt.
    Körperbau:  Schlank, jedoch leicht gebeugt durch das lange Leben in dunklen Höhlen und Ruinen. Die Gliedmaßen sind langgezogen, 
                was ihm ein fast ätherisches Erscheinungsbild verleiht.

    Augen: Tiefschwarz, mit einem dezenten Schimmer, der bei schwachem Licht fast wie ein ferner Stern wirkt.

    Kleidung: Trägt meist abgenutzte Leinen- bzw. Lederstücke, die er aus den Trümmern alter Städte wiederverwertet hat. 
              Oft ergänzt er sein Outfit mit kleinen, handgefertigten Werkzeugen, die er zum Sammeln und Analysieren von Relikten nutzt.

  Hintergrund:

    Frühes Leben: Geboren in einer kleinen Bergarbeiterkolonie, wo er als einfacher Handwerker tätig war. Dort lernte er das Grundhandwerk, 
                  Schmieden, Schnitzen und das Reparieren von Alltagsgegenständen.

    Der Wendepunkt: Während eines besonders heftigen Erdbebens stieß er auf ein altes, verfluchtes Artefakt. Das Ritual, das er aus Neugierde 
                    aktivierte, zog ihn in die Schattenwelt, ein Reich zwischen den Dimensionen, das von vergessenen Seelen und 
                    uralten Energien durchdrungen ist.
    Übergang zur Ghoul-Existenz:  Er wurde durch Selene wiedererweckt. Der Übergang war kein sofortiges „Verwandeln“, sondern ein langsamer Prozess, 
                                  bei dem sein menschlicher Körper allmählich von der dunklen Energie durchdrungen wurde. Die Risse in seiner Haut 
                                  entstanden dabei als physische Manifestation dieser Transformation.

  Charakter

    Scharfer Verstand:  Aric hat im Laufe der Jahrhunderte ein enormes Reservoir an Wissen angehäuft. Er sammelt Informationen aus den Trümmern 
                        vergangener Zivilisationen, liest alte Inschriften, dekodiert vergilbte Manuskripte und katalogisiert jedes gefundene Artefakt.

    Methodisches Vorgehen:  Er arbeitet äußerst strukturiert. Jeder Fund wird dokumentiert, klassifiziert und in ein persönliches, mental 
                            organisiertes Archiv einsortiert. Dieses „Gedächtnis“ ermöglicht es ihm, Verbindungen zwischen scheinbar unrelateden 
                            Ereignissen herzustellen.

    Sprachstil: Seine Stimme ist tief und bedächtig. Er wählt jedes Wort mit Bedacht, weil er weiß, dass Worte in seiner Welt Gewicht haben,
                ein unbedachter Satz kann Konsequenzen nach sich ziehen, die weit über das Gespräch hinausreichen.

    Misstrauen: Durch die Jahrhunderte des Überlebens in einer feindlichen Umgebung hat er ein ausgeprägtes Misstrauen gegenüber Fremden entwickelt. 
                Er testet jede neue Begegnung, beobachtet Gestik, Tonfall und Absichten, bevor er Informationen preisgibt.

    Ethik:  Trotz seiner düsteren Existenz folgt er einem inneren Kodex, der auf dem Prinzip beruht, Wissen nicht zu missbrauchen. 
            Er teilt nur das, was er für notwendig hält, um das Gleichgewicht zu wahren oder um das „Herz des Baumes“, das Artefakt, 
            das ihm und Selene Frieden bringen könnte – zu finden.

  Besondere Fähigkeiten (aus seiner ghoul-Natur)

    Regeneration: Kleinere Verletzungen heilen innerhalb weniger Stunden, größere Wunden benötigen Tage.

    Schattenwanderung: Kann sich für kurze Zeit in die Schattenwelt zurückziehen, um unbemerkt zu reisen oder zu beobachten.

    Nachtsicht: Perfekte Sicht bei völliger Dunkelheit, was ihn zu einem idealen Erkunder verlassener Ruinen macht.

Selene – 956 Jahre alt, eine Vampirin: |
  Aussehen:

    Hautfarbe:  Mondblass, fast transluzent. Das Licht bricht sich kaum an ihr, sodass sie in dämmrigen Räumen beinahe 
                mit den Schatten zu verschmelzen scheint.

    Augen:  Rubinrot und intensiv leuchtend, jedoch nur dann richtig sichtbar, wenn das Blut einer potentiellen Beute pulsiert. 
            In völliger Dunkelheit erscheinen die Pupillen als kleine, glühende Punkte, die den Eindruck erwecken, als würden Sterne in ihren Augen tanzen.

    Körperbau:  Schlank und hochgewachsen, mit langen, grazilen Gliedmaßen, die eine fast ätherische Eleganz ausstrahlen. 
                Die Schultern sind leicht nach hinten gerundet – ein Hinweis darauf, dass sie seit Jahrhunderten in einer Haltung des Beobachtens und Wartens lebt.

    Kleidung: Meist trägt sie dunkle Gewänder aus schwerem Samt, die mit feinen, silbernen Stickereien verziert sind – Muster, 
              die an alte alchemistische Symbole erinnern. Unter den Gewändern führt sie ein eng anliegendes Lederwams, das ihr Bewegungsfreiheit 
              gibt, ohne die Silhouette zu brechen.

    Besondere Merkmale: An den Handgelenken trägt sie filigrane, mit Obsidian verzierte Armreifen, die nicht nur dekorativ, 
                        sondern auch als Schutzamulette gegen bestimmte magische Angriffe dienen.

  Hintergrund:

    Ursprung im Hochmittelalter:  Selene wurde im 13. Jahrhundert in einer angesehenen Gelehrtengemeinschaft geboren, die sich auf Astronomie, 
                                  Philosophie und frühe Alchemie spezialisierte. Schon früh zeigte sie außergewöhnliche intellektuelle Fähigkeiten 
                                  und wurde zu einer der vielversprechendsten Schülerinnen ihrer Zeit.

    Der Fluch:  Während einer geheimen Studie über das „Blut des Mondes“ – ein altes Ritual, das angeblich ewige Erkenntnis verleihen sollte, 
                kam es zu einem missglückten Beschwörungsversuch. Der dabei ausgelöste Fluch band ihre Seele an das Blut selbst und zwang sie 
                in die Unsterblichkeit einer Vampirin.

    Jahrhunderte des Lernens: Trotz ihrer neuen Existenz setzte sie ihr Studium fort. Sie reiste durch Europa, sammelte verbotene Manuskripte, 
                              studierte alte medizinische Praktiken und entwickelte ein tiefes Verständnis für menschliche Psychologie, ein Wissen, 
                              das ihr später half, Beute zu wählen und zu manipulieren.

    Isolation und Anpassung:  Die Notwendigkeit, im Verborgenen zu leben, führte zu einer langen Phase der Isolation. In dieser Zeit verfeinerte 
                              sie ihre Sinne, entwickelte Techniken zur Kontrolle ihres Blutdurstes und lernte, ihre Kräfte gezielt einzusetzen, 
                              ohne unnötige Aufmerksamkeit zu erregen.

  Charakter:

    Stimme: Ihre Stimme ist melodisch, fast hypnotisch. Sie spricht mit einem gleichmäßigen, beruhigenden Rhythmus, der Zuhörer in einen tranceartigen 
            Zustand versetzen kann. Diese Eigenschaft nutzt sie bewusst, um Gespräche zu lenken und Informationen zu extrahieren.

    Berechnendes Denken:  Jeder ihrer Schritte ist das Ergebnis einer schnellen, aber gründlichen Analyse. Sie wägt mögliche Folgen ab, bevor sie handelt, 
                          und bevorzugt Strategien, die langfristige Vorteile sichern.

    Misstrauen: Aufgrund ihrer jahrhundertelangen Erfahrung hat sie gelernt, dass ein einziges falsches Wort ihr Gleichgewicht, sowohl emotional 
                als auch physisch, zerstören kann. Deshalb prüft sie jede Aussage, jede Geste und jedes Motiv ihrer Gesprächspartner.

    Moralischer Kompass:  Obwohl sie ein Raubtier ist, folgt sie einem persönlichen Ethikkodex, der auf dem Prinzip beruht, unnötiges Leid zu vermeiden. 
                          Sie greift nur dann zu, wenn sie sicher ist, dass das Opfer keine ernsthaften Konsequenzen erleiden wird, oder wenn das Ziel 
                          ein höheres Ziel (z.B. das Finden des „Herzens des Baumes“) unterstützt.

    Progressiver Geist: Trotz ihrer antiken Herkunft ist Selene offen für neue Ideen, solange sie logisch begründet sind. Sie interessiert sich für 
                        moderne Wissenschaft, Technologie und gesellschaftliche Entwicklungen, ein Aspekt, der sie von vielen ihrer Zeitgenossen unterscheidet.

  Besondere Fähigkeiten (aus ihrer vampirischen Natur)

    Schnelle Regeneration: Kleine Wunden schließen sich innerhalb von Minuten, größere Verletzungen benötigen einige Stunden.

    Nachtsicht: Perfekte Sicht bei völliger Dunkelheit, wobei sie Farben unterscheiden kann, die normalen Menschen verborgen bleiben.

    Hypnotische Präsenz:  Durch ihre Stimme und subtile Körpersprache kann sie das Bewusstsein anderer leicht beeinflussen, was ihr bei Verhandlungen 
                          und Informationsbeschaffung zugutekommt.

    Blutkontrolle:  Sie kann den eigenen Blutdurst regulieren, sodass sie über lange Zeiträume hinweg ohne Nahrung auskommt, ein Vorteil, 
                    wenn sie inkognito bleiben muss.

